<div class="table-container-pro">
    <div class="table-header-flex">
        <h3 class="table-title">Recent Inventory</h3>

        <div class="search-area">
            <div class="search-card">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Search orders, stock or customers..." [(ngModel)]="searchText">
            </div>
        </div>

        <a routerLink="/admin/addproduct" class="btn-add-pro">
            <i class="fa-solid fa-plus"></i> Add New Product
        </a>
    </div>

    <div class="glass-table-wrapper">
        <table class="custom-pro-table">
            <thead>
                <tr>
                    <th>Sr No</th>
                    <th>Product Name</th>
                    <th>Picture</th>
                    <th>Price</th>
                    <th>Description</th>
                    <th class="text-center">Action</th>
                </tr>
            </thead>
            <tbody>
                <!-- <tr>
                    <td>01</td>
                    <td class="font-weight-600">Fresh Organic Apples</td>
                    <td>
                        <div class="table-img-box">
                            <img src="https://via.placeholder.com/40" alt="product">
                        </div>
                    </td>
                    <td><span class="price-tag">$12.00</span></td>
                    <td class="text-muted">High quality hand-picked...</td>
                    <td>
                        <div class="action-btns-flex">
                            <button class="edit-btn"><i class="fa-solid fa-pen"></i></button>
                            <button class="delete-btn"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </td>
                </tr> -->
                <tr class="table-primary" *ngFor="let p of products | search:searchText; let i = index">
                    <td>{{i+1}}</td>
                    <td>{{p.pname}}</td>

                    <td>
                        <img [src]="'http://localhost:3000/upload/' + p.pic" width="70" height="70"
                            class="img-thumbnail" />
                    </td>

                    <td>{{p.price}}</td>
                    <td>{{p.description}}</td>

                    <td>
                        <div class="action-btns-flex">
                            <button class="edit-btn" [routerLink]="['/admin/editproduct', p._id]">
                                <i class="fa-solid fa-pen"></i>
                            </button>
                            <button class="delete-btn" (click)="deleteProduct(p._id)">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
