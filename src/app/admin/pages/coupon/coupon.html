<div class="coupon-page">

    <!-- CREATE / EDIT FORM -->
    <div class="coupon-card">

        <h2>{{ editingId ? 'Edit Coupon' : 'Create Coupon' }}</h2>

        <div class="coupon-form">

            <div class="form-group">
                <label>Coupon Code</label>
                <input type="text" [(ngModel)]="couponData.code" placeholder="SAVE50">
            </div>

            <div class="form-group">
                <label>Discount Type</label>
                <select [(ngModel)]="couponData.discountType">
                    <option value="flat">Flat</option>
                    <option value="percentage">Percentage</option>
                </select>
            </div>

            <div class="form-group">
                <label>Discount Value</label>
                <input type="number" [(ngModel)]="couponData.discountValue">
            </div>

            <div class="form-group">
                <label>Min Order</label>
                <input type="number" [(ngModel)]="couponData.minOrderAmount">
            </div>

            <div class="form-group">
                <label>Max Discount</label>
                <input type="number" [(ngModel)]="couponData.maxDiscount">
            </div>

            <div class="form-group">
                <label>Expiry Date</label>
                <input type="date" [(ngModel)]="couponData.expiryDate">
            </div>

        </div>

        <button class="create-btn" (click)="saveCoupon()">
            {{ editingId ? 'Update Coupon' : 'Create Coupon' }}
        </button>

    </div>


    <!-- COUPON TABLE -->
    <div class="coupon-card">

        <h2>All Coupons</h2>

        <table class="coupon-table">

            <thead>
                <tr>
                    <th>Code</th>
                    <th>Type</th>
                    <th>Value</th>
                    <th>Min Order</th>
                    <th>Expiry</th>
                    <th>Status</th>
                    <th>Active</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>

                <tr *ngFor="let c of coupons; trackBy: trackById">

                    <td class="coupon-code-text">{{ c.code }}</td>

                    <td>
                        <span class="type-badge">
                            {{ c.discountType }}
                        </span>
                    </td>

                    <td>₹{{ c.discountValue }}</td>

                    <td>₹{{ c.minOrderAmount }}</td>

                    <td>{{ c.expiryDate | date:'mediumDate' }}</td>

                    <!-- Expiry Status -->
                    <td>
                        <span class="status" [class.expired]="isExpired(c.expiryDate)">
                            {{ isExpired(c.expiryDate) ? 'Expired' : 'Active' }}
                        </span>
                    </td>

                    <!-- Active Toggle -->
                    <td>

                        <label class="switch">
                            <input type="checkbox" [checked]="c.isActive" (change)="toggleStatus(c)">
                            <span class="slider"></span>
                        </label>

                    </td>

                    <!-- Actions -->
                    <td>

                        <button class="edit-btn" (click)="editCoupon(c)">
                            Edit
                        </button>

                        <button class="delete-btn" (click)="deleteCoupon(c._id)">
                            Delete
                        </button>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</div>
