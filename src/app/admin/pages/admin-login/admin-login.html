<div class="container py-3">
  <div class="row justify-content-center align-items-center g-4">
    <div class="col-12 col-md-10 col-lg-8 col-xl-6">
      <div class="card login-card overflow-hidden">
        <div class="card-body p-4 p-xl-5">
          <div class="row g-4 align-items-center">
            <!-- Admin Icon Section -->
            <div class="col-md-5 d-none d-md-block">
              <div class="illustration-peek text-center">
                <div class="product-icon mb-3">
                  <i class="bi bi-shield-lock-fill" style="font-size: 3rem; color: #1e4d3b;"></i>
                </div>
                <h5 class="fw-semibold mt-2" style="color: #1d4534;">Admin Portal</h5>
                <p class="small text-secondary mb-3">Manage your e-grocery platform</p>
                <div class="d-flex flex-wrap gap-2 justify-content-center mt-2">
                  <span class="badge bg-light text-dark p-2"><i class="bi bi-box-seam me-1"></i> Products</span>
                  <span class="badge bg-light text-dark p-2"><i class="bi bi-people me-1"></i> Users</span>
                  <span class="badge bg-light text-dark p-2"><i class="bi bi-cart-check"></i> Orders</span>
                </div>
              </div>
            </div>

            <!-- Login Form -->
            <div class="col-md-7">
              <div class="d-flex align-items-center gap-3 mb-4">
                <div class="brand-icon">
                  <i class="bi bi-shield-check"></i>
                </div>
                <div>
                  <h2 class="h4 fw-bold mb-0" style="color: #1e3a2f;">Admin Login</h2>
                  <span class="fresh-badge"><i class="bi bi-gear-fill me-1"></i>Dashboard Access</span>
                </div>
              </div>

              <h1 class="h3 fw-semibold mb-1" style="color: #1f4035;">Welcome Admin</h1>
              <p class="text-secondary-emphasis small mb-4">Sign in to access the admin panel</p>

              <form [formGroup]="frmGrp" (ngSubmit)="onsubmit()" novalidate>
                <!-- Email -->
                <div class="mb-4">
                  <label class="form-label fw-medium text-secondary" style="font-size: 0.9rem;">
                    <i class="bi bi-envelope-paper me-1"></i>Admin Email
                  </label>
                  <div class="input-group">
                    <span class="input-group-text input-group-text-custom bg-white"><i class="bi bi-person-badge"></i></span>
                    <input formControlName="email" type="email" class="form-control grocery-input" placeholder="admin@grocery.com" required>
                  </div>
                  <app-custom-validation [control]="frmGrp.get('email')"></app-custom-validation>
                </div>

                <!-- Password -->
                <div class="mb-4">
                  <label class="form-label fw-medium text-secondary" style="font-size: 0.9rem;">
                    <i class="bi bi-shield-lock me-1"></i>Password
                  </label>
                  <div class="input-group">
                    <span class="input-group-text input-group-text-custom bg-white"><i class="bi bi-key"></i></span>
                    <input formControlName="password" type="password" class="form-control grocery-input" placeholder="Enter password" required>
                    <button class="btn btn-outline-secondary border border-start-0 rounded-end-4" type="button" style="border-color:#e2e8f0; background: white;">
                      <i class="bi bi-eye"></i>
                    </button>
                  </div>
                  <app-custom-validation [control]="frmGrp.get('password')"></app-custom-validation>
                </div>

                <!-- Remember Me -->
                <div class="d-flex justify-content-between align-items-center mb-4">
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="rememberMe" style="border-color: #2b7a4b;">
                    <label class="form-check-label small" for="rememberMe">
                      Keep me signed in
                    </label>
                  </div>
                </div>

                <!-- Login Button -->
                <button class="btn btn-grocery w-100" type="submit">
                  <i class="bi bi-box-arrow-in-right me-2"></i>Admin Login
                </button>

                <div class="mt-3 text-center small text-muted">
                  <i class="bi bi-shield-check me-1"></i> Secure admin access
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
