<div class="container mt-4">

    <h3 class="mb-4">My Wishlist ❤️</h3>

    <!-- Loading -->
    <div *ngIf="wishlist === null" class="text-center">
        Loading wishlist...
    </div>

    <!-- Empty -->
    <div *ngIf="wishlist && wishlist.length === 0" class="text-center">
        Your wishlist is empty
    </div>

    <!-- Items -->
    <div class="row" *ngIf="wishlist && wishlist.length > 0">

        <div class="col-md-3 mb-4" *ngFor="let item of wishlist">

            <div class="card shadow-sm">

                <img [src]="'http://localhost:3000/upload/' + item.pic" alt="product">

                <div class="card-body text-center">

                    <h6>{{item.pname}}</h6>

                    <p class="text-muted small mb-2">
                        {{item.description}}
                    </p>

                    <p class="text-success fw-bold">
                        ₹{{item.price}}
                    </p>

                    <button class="btn btn-primary btn-sm me-2" (click)="addToCart(item)">
                        Add to Cart
                    </button>

                    <button class="btn btn-danger btn-sm" (click)="remove(item._id)">
                        Remove
                    </button>

                </div>

            </div>

        </div>

    </div>

</div>
