<div class="checkout-container">

    <div class="checkout-grid">

        <!-- ADDRESS CARD -->
        <div class="card address-card">

            <h3>Delivery Address</h3>

            <div class="form-group">
                <label>Name</label>
                <input type="text" name="name" [(ngModel)]="name" required>
            </div>

            <div class="form-group">
                <label>Phone</label>
                <input type="text" name="phone" [(ngModel)]="phone" required>
            </div>

            <div class="form-group">
                <label>Address</label>
                <textarea rows="3" name="address" [(ngModel)]="address" required></textarea>
            </div>

            <div class="form-group">
                <label>City</label>
                <input type="text" name="city" [(ngModel)]="city" required>
            </div>

        </div>


        <!-- ORDER SUMMARY -->
        <div class="card summary-card">

            <h3>Your Order</h3>

            <div class="cart-item" *ngFor="let item of cartItems">

                <img [src]="'http://localhost:3000/upload/' + item.productId.pic">

                <div class="item-info">
                    <h4>{{item.productId.name}}</h4>
                    <p>Qty : {{item.quantity}}</p>
                </div>

                <div class="price">
                    ₹ {{item.productId.price * item.quantity}}
                </div>

            </div>

            <hr>

            <div class="price-row">
                <span>Items Total</span>
                <span>₹ {{total}}</span>
            </div>

            <div *ngIf="discount > 0" class="price-row text-success">
                <span>Coupon Discount</span>
                <span>- ₹ {{discount}}</span>
            </div>

            <div class="price-row">
                <span>Delivery Fee</span>
                <span>₹ 40</span>
            </div>

            <div class="price-total">
                <span>Total</span>
                <span>₹ {{ (total + 40) - discount }}</span>
            </div>

            <button class="order-btn" (click)="placeOrder()">
                Place Order
            </button>

        </div>

    </div>

</div>
