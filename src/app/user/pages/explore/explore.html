<div class="container my-5">
  <h2 class="section-title mb-4">Featured Produce</h2><br>
  
   <div class="search-area">
            <div class="search-card">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Search orders, stock or customers..." [(ngModel)]="searchText">
            </div><br>
  <div class="row g-4">
    <!-- avocado smoothie -->
   <div class="col-md-6 col-lg-3" *ngFor="let p of products | search:searchText; let i = index">
      <div class="product-card-vertical">
        <img [src]="'http://localhost:3000/upload/' + p.pic" alt="">
        <h5 class="fw-bold mb-0">{{p.pname}}</h5>
        <div class="product-description">{{p.description}}</div>
        <div class="d-flex align-items-center justify-content-between mt-1">
          <span class="fw-bold text-leaf fs-4">{{p.price}}</span>
          <button class="btn-add-cart" (click)="addToCart(p._id)"><i class="bi bi-cart-plus me-1"></i>Add</button>
        </div>
        <span class="badge bg-warning text-dark mt-2 w-50">100% fresh</span>
      </div>
    </div>
